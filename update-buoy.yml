name: Update NDBC buoy cache

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-buoy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch buoy 42357
        run: |
          mkdir -p data
          curl -L --retry 3 --fail https://www.ndbc.noaa.gov/data/realtime2/42357.txt -o data/buoy-42357.txt
      - name: Commit updated buoy cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/buoy-42357.txt
          git diff --cached --quiet || git commit -m "Update buoy 42357 cache"
          git push
