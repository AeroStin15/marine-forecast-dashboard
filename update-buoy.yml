name: Update NDBC buoy cache

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-buoy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest NDBC station data
        run: |
          mkdir -p data
          curl -L --fail --retry 3 --retry-delay 5 \
            https://www.ndbc.noaa.gov/data/realtime2/42357.txt \
            -o data/buoy-42357.txt

      - name: Commit updated buoy cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/buoy-42357.txt
          git diff --cached --quiet && echo "No buoy changes to commit" || git commit -m "Update NDBC buoy cache"
          git push
